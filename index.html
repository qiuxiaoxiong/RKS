<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKS 秋小熊服务器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #0a0a1a;
            color: #fff;
            overflow: hidden;
        }
        .page {
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .page.active {
            display: flex;
        }
        .input-box {
            background: #151530;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px #4169E1;
            text-align: center;
            border: 1px solid #3366ff;
        }
        .input-box h2 {
            margin-bottom: 25px;
            color: #58a6ff;
        }
        .input-box input {
            width: 280px;
            height: 45px;
            background: #0f0f25;
            border: 1px solid #3366ff;
            border-radius: 8px;
            color: #fff;
            text-align: center;
            font-size: 18px;
            outline: none;
            padding: 0 10px;
        }
        .input-box button {
            margin-top: 20px;
            width: 280px;
            height: 45px;
            background: #3366ff;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
        }
        .input-box button:hover {
            background: #1a4cd8;
        }
        .tips-float {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid #22c55e;
            color: #22c55e;
            font-size: 16px;
            box-shadow: 0 0 15px #22c55e;
            display: none;
            z-index: 999;
        }
        .load-ui {
            width: 90%;
            max-width: 400px;
        }
        .load-ui h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #58a6ff;
            font-size: 18px;
        }
        .progress-bg {
            width: 100%;
            height: 20px;
            background: #151530;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #3366ff;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg,#3366ff,#22c55e);
            border-radius: 10px;
            transition: all 0.05s linear;
        }
        .face-scan {
            width: 220px;
            height: 280px;
            border: 3px solid #22c55e;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0 25px #22c55e;
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: #22c55e;
            top: 0;
            left: 0;
            box-shadow: 0 0 10px #22c55e;
            animation: scan 2s ease-in-out infinite;
        }
        @keyframes scan {
            0%{top:0;}
            50%{top:calc(100% - 3px);}
            100%{top:0;}
        }
        .success-big {
            font-size: 42px;
            font-weight: bold;
            color: #22c55e;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #22c55e;
        }
        .success-desc {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 40px;
        }
        .func-btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 260px;
        }
        .func-btn {
            width: 100%;
            height: 50px;
            background: #151530;
            border: 1px solid #3366ff;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .func-btn:hover {
            background: #3366ff;
            box-shadow: 0 0 15px #3366ff;
        }
    </style>
</head>
<body>
    <div class="tips-float" id="tips">检测到是开发者用户已为你自动屏蔽</div>

    <div class="page active" id="page1">
        <div class="input-box">
            <h2>秋小熊服务器 卡密验证</h2>
            <input type="text" id="pwdInput" placeholder="请输入卡密">
            <button onclick="checkPwd()">确认验证</button>
        </div>
    </div>

    <div class="page" id="page2">
        <div class="load-ui">
            <h3>正在尝试入侵ACE服务器</h3>
            <div class="progress-bg">
                <div class="progress-bar" id="bar"></div>
            </div>
        </div>
    </div>

    <div class="page" id="page3">
        <div class="face-scan">
            <div class="scan-line"></div>
        </div>
        <div class="success-big">入侵成功</div>
        <div class="success-desc">服务器连接正常</div>
        <div class="func-btn-group">
            <a href="https://1841782875.share.123pan.cn/123pan/FiqrTd-7OkV" target="_blank" style="text-decoration: none;">
                <button class="func-btn">自瞄</button>
            </a>
            <a href="https://1841782875.share.123pan.cn/123pan/FiqrTd-7OkV" target="_blank" style="text-decoration: none;">
                <button class="func-btn">断点子追</button>
            </a>
            <a href="https://1841782875.share.123pan.cn/123pan/FiqrTd-7OkV" target="_blank" style="text-decoration: none;">
                <button class="func-btn">硬件子追</button>
            </a>
        </div>
    </div>

    <script>
        const rightPwd = "RKSNBQJ";
        let tips = document.getElementById('tips');
        let page1 = document.getElementById('page1');
        let page2 = document.getElementById('page2');
        let page3 = document.getElementById('page3');
        let bar = document.getElementById('bar');

        function checkPwd() {
            let val = document.getElementById('pwdInput').value.trim();
            if(val === rightPwd){
                tips.style.display = 'block';
                setTimeout(()=>{
                    tips.style.display = 'none';
                    page1.classList.remove('active');
                    page2.classList.add('active');
                    startProgress();
                },2000);
            }else{
                alert('卡密错误，请重新输入！');
            }
        }

        function startProgress(){
            let num = 0;
            let timer = setInterval(()=>{
                num++;
                bar.style.width = num + '%';
                if(num >= 100){
                    clearInterval(timer);
                    setTimeout(()=>{
                        page2.classList.remove('active');
                        page3.classList.add('active');
                    },500);
                }
            },30);
        }
    </script>
</body>
</html>
